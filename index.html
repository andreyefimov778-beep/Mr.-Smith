<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabula.Smith — Технические работы</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Exo+2:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f2ede4;
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      overflow: hidden;
    }

    /* Фоновый узор */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(26,111,168,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,74,16,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      margin-bottom: 48px;
      opacity: 0.5;
    }
    .logo-fab   { color: #1a6fa8; }
    .logo-dot   { color: #c84a10; }
    .logo-smith { color: #1a1a1a; }

    .card {
      background: #fff;
      border: 1px solid #c0a87a;
      border-radius: 6px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      position: relative;
    }

    /* Верхняя полоска */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1a6fa8, #c84a10);
      border-radius: 6px 6px 0 0;
    }

    .photo-wrap {
      margin-bottom: 32px;
    }

    .photo-wrap img {
      width: 100%;
      max-width: 420px;
      border-radius: 4px;
      border: 1px solid #c0a87a;
      filter: sepia(15%);
    }

    /* ===== ДРОЖАЩИЙ ТЕКСТ ===== */
    .shake-text {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.5;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    .shake-text .word {
      display: inline-block;
      white-space: nowrap;
    }

    /* Каждая буква дрожит со своей фазой */
    .shake-text span {
      display: inline-block;
      animation: shake var(--dur, 0.3s) var(--delay, 0s) infinite alternate ease-in-out;
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      20%  { transform: translate(var(--x1), var(--y1)) rotate(var(--r1)); }
      40%  { transform: translate(var(--x2), var(--y2)) rotate(var(--r2)); }
      60%  { transform: translate(var(--x3), var(--y3)) rotate(var(--r1)); }
      80%  { transform: translate(var(--x2), var(--y1)) rotate(var(--r2)); }
      100% { transform: translate(var(--x1), var(--y2)) rotate(0deg); }
    }

    .sub {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    .sub span {
      display: inline-block;
      animation: float 2.5s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to   { transform: translateY(-4px); }
    }

    .badge {
      display: inline-block;
      margin-top: 28px;
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #c84a10;
      border: 1px solid #c84a10;
      padding: 5px 14px;
      border-radius: 2px;
      opacity: 0.7;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <span class="logo-fab">FABULA</span><span class="logo-dot">.</span><span class="logo-smith">SMITH</span>
  </div>

  <div class="card">
    <div class="photo-wrap">
      <img src="beer.jpg" alt="Админ пьёт пиво">
    </div>

    <div class="shake-text" id="shakeText"></div>

    <p class="sub"><span>Скоро вернёмся... наверное 🍺</span></p>

    <div class="badge">ТЕХНИЧЕСКИЕ РАБОТЫ</div>
  </div>

  <script>
    const text = "САЙТ НЕ РАБОТАЕТ, АДМИН ПЬЁТ ПИВО";
    const container = document.getElementById('shakeText');

    // Разбиваем на слова, внутри слов — на буквы
    text.split(' ').forEach((word, wi) => {
      const wordSpan = document.createElement('span');
      wordSpan.className = 'word';

      word.split('').forEach((ch, ci) => {
        const s = document.createElement('span');
        s.textContent = ch === ' ' ? '\u00A0' : ch;

        // Уникальные параметры дрожания для каждой буквы
        const seed = (wi * 13 + ci * 7 + 1);
        const dur  = (0.18 + (seed % 17) * 0.02).toFixed(2);
        const del  = ((seed % 23) * 0.04).toFixed(2);
        const x1   = ((seed % 5) - 2) + 'px';
        const y1   = ((seed % 4) - 2) + 'px';
        const x2   = (((seed * 3) % 5) - 2) + 'px';
        const y2   = (((seed * 2) % 4) - 2) + 'px';
        const x3   = (((seed * 5) % 5) - 2) + 'px';
        const y3   = (((seed * 4) % 4) - 2) + 'px';
        const r1   = (((seed % 7) - 3) * 0.8).toFixed(1) + 'deg';
        const r2   = ((((seed * 3) % 7) - 3) * 0.8).toFixed(1) + 'deg';

        s.style.cssText = `
          --dur: ${dur}s; --delay: ${del}s;
          --x1:${x1}; --y1:${y1};
          --x2:${x2}; --y2:${y2};
          --x3:${x3}; --y3:${y3};
          --r1:${r1}; --r2:${r2};
        `;
        wordSpan.appendChild(s);
      });

      container.appendChild(wordSpan);
      // Пробел между словами
      if (wi < text.split(' ').length - 1) {
        const sp = document.createElement('span');
        sp.innerHTML = '&nbsp;';
        sp.style.display = 'inline-block';
        container.appendChild(sp);
      }
    });
  </script>

</body>
</html>
