<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA ACADEMY | Школа Будущего</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #4f46e5 0%, #0f172a 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-white" 
      x-data="{ 
        view: 'home', 
        activeDay: 'Понедельник',
        activeLessonName: 'Урок 1.1',
        activeVideoId: 'dQw4w9WgXcQ', 
        
        // --- БЛОК РЕДАКТИРОВАНИЯ: [Название, ID_видео_YouTube] ---
        academy: {
            'Понедельник': [
                ['варим борщ', 'KoT1G4sAjPY'], 
                ['варим суп', 'dQw4w9WgXcQ'],
                ['варим плов', 'dQw4w9WgXcQ'],
                ['жарим чебуреки', 'dQw4w9WgXcQ'],
                ['Выхатной', 'dQw4w9WgXcQ']
            ],
            'Вторник': [
                ['Урок 2.1', 'dQw4w9WgXcQ'],
                ['Урок 2.2', 'dQw4w9WgXcQ'],
                ['Урок 2.3', 'dQw4w9WgXcQ'],
                ['Урок 2.4', 'dQw4w9WgXcQ'],
                ['Урок 2.5', 'dQw4w9WgXcQ']
            ],
            'Среда': [
                ['Урок 3.1', 'dQw4w9WgXcQ'],
                ['Урок 3.2', 'dQw4w9WgXcQ'],
                ['Урок 3.3', 'dQw4w9WgXcQ'],
                ['Урок 3.4', 'dQw4w9WgXcQ'],
                ['Урок 3.5', 'dQw4w9WgXcQ']
            ],
            'Четверг': [
                ['Урок 4.1', 'dQw4w9WgXcQ'],
                ['Урок 4.2', 'dQw4w9WgXcQ'],
                ['Урок 4.3', 'dQw4w9WgXcQ'],
                ['Урок 4.4', 'dQw4w9WgXcQ'],
                ['Урок 4.5', 'dQw4w9WgXcQ']
            ],
            'Пятница': [
                ['Урок 5.1', 'dQw4w9WgXcQ'],
                ['Урок 5.2', 'dQw4w9WgXcQ'],
                ['Урок 5.3', 'dQw4w9WgXcQ'],
                ['Урок 5.4', 'dQw4w9WgXcQ'],
                ['Урок 5.5', 'dQw4w9WgXcQ']
            ]
        },
        
        selectLesson(lessonData) {
            this.activeLessonName = lessonData[0];
            this.activeVideoId = lessonData[1];
        }
      }">

    <nav class="fixed w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3">
            <div class="flex items-center space-x-2 cursor-pointer" @click="view = 'home'">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-black text-2xl shadow-lg text-white">A</div>
                <span class="text-xl font-bold tracking-tight text-white uppercase">Alpha<span class="text-indigo-400">.Edu</span></span>
            </div>
            <button @click="view = 'learning'" class="bg-indigo-500 hover:bg-indigo-600 px-6 py-2.5 rounded-xl text-sm font-bold transition text-white">
                Личный кабинет
            </button>
        </div>
    </nav>

    <main x-show="view === 'home'" x-transition:enter="transition ease-out duration-500">
        <section class="min-h-screen flex items-center justify-center px-6 hero-gradient relative overflow-hidden text-center">
            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 40px 40px;"></div>
            <div class="max-w-5xl mx-auto relative z-10">
                <h1 class="text-6xl md:text-8xl font-black mb-8 leading-[1.1] tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400">
                    Твое будущее <br> порешает Смит :)
                </h1>
                <button @click="view = 'learning'" class="bg-white text-[#0f172a] px-10 py-5 rounded-2xl font-black text-lg hover:bg-indigo-400 hover:text-white transition shadow-2xl">
                    Чёткие уроки
                </button>
            </div>
        </section>
    </main>

    <main x-show="view === 'learning'" x-transition class="pt-28 pb-20 px-6 min-h-screen bg-slate-50 text-slate-900">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex overflow-x-auto pb-6 mb-8 space-x-4 no-scrollbar">
                <template x-for="(lessons, day) in academy" :key="day">
                    <button @click="activeDay = day; selectLesson(lessons[0])" 
                            :class="activeDay === day ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-200' : 'bg-white text-slate-400 hover:bg-slate-100'"
                            class="flex-shrink-0 px-8 py-4 rounded-2xl font-black text-sm transition-all border border-slate-200 shadow-sm">
                        <span x-text="day"></span>
                    </button>
                </template>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">
                <div class="lg:w-2/3">
                    <div class="aspect-video bg-black rounded-[2.5rem] overflow-hidden shadow-2xl relative border-[12px] border-white">
                        <iframe class="w-full h-full" 
                                :src="'https://www.youtube.com/embed/' + activeVideoId" 
                                frameborder="0" 
                                allow="autoplay; encrypted-media; picture-in-picture" 
                                allowfullscreen>
                        </iframe>
                    </div>
                    <div class="mt-8 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                        <h2 class="text-3xl font-black mb-2 text-slate-900" x-text="activeLessonName"></h2>
                        <p class="text-slate-500">Обучающий модуль • <span x-text="activeDay"></span></p>
                    </div>
                </div>

                <div class="lg:w-1/3 text-left">
                    <div class="bg-white rounded-[2rem] p-8 border border-slate-200 shadow-sm">
                        <h3 class="text-2xl font-black text-slate-900 mb-6" x-text="activeDay"></h3>
                        <div class="space-y-3 text-left">
                            <template x-for="(lesson, index) in academy[activeDay]" :key="index">
                                <div @click="selectLesson(lesson)" 
                                     :class="activeLessonName === lesson[0] ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-slate-50 border-transparent text-slate-400 hover:bg-slate-100'"
                                     class="p-5 rounded-2xl border-2 cursor-pointer transition-all flex items-center">
                                    <span class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center text-xs font-black mr-4 text-slate-900" x-text="index + 1"></span>
                                    <span class="font-bold text-sm" x-text="lesson[0]"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center opacity-30 text-xs font-bold uppercase tracking-widest text-white">
        © 2026 Alpha Academy
    </footer>

</body>
</html>
