<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Girl — Gemini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #c8aa7a; --dark: #0d0d10; --bubble-bg: rgba(13,13,16,0.93); }

  body {
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Inter', sans-serif;
    overflow: hidden; gap: 40px; padding: 20px;
  }

  .scene {
    position: relative; width: 360px; height: 440px;
    flex-shrink: 0;
  }
  .corner { position:absolute; width:24px; height:24px; border-color:rgba(200,170,130,0.5); border-style:solid; z-index:10; }
  .corner-tl{top:-6px;left:-6px;border-width:1px 0 0 1px}
  .corner-tr{top:-6px;right:-6px;border-width:1px 1px 0 0}
  .corner-bl{bottom:-6px;left:-6px;border-width:0 0 1px 1px}
  .corner-br{bottom:-6px;right:-6px;border-width:0 1px 1px 0}

  /* Canvas replaces img — draws photo + mouth animation */
  #faceCanvas {
    width: 360px; height: 440px;
    border-radius: 3px;
    display: block;
    box-shadow: 0 40px 100px rgba(0,0,0,0.9);
  }

  /* Speech bubble */
  .speech-bubble {
    position:absolute; top:-10px; right:-275px; width:255px;
    background:var(--bubble-bg); border:1px solid rgba(200,170,122,0.25);
    border-radius:16px 16px 16px 4px; padding:14px 16px; z-index:20;
    opacity:0; transform:translateY(8px) scale(0.96);
    transition:opacity 0.4s,transform 0.4s;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  .speech-bubble.visible { opacity:1; transform:translateY(0) scale(1); }
  .speech-bubble::before {
    content:''; position:absolute; left:-8px; top:20px; width:16px; height:16px;
    background:var(--bubble-bg); border-left:1px solid rgba(200,170,122,0.25);
    border-bottom:1px solid rgba(200,170,122,0.25);
    transform:rotate(45deg); clip-path:polygon(0 0,0% 100%,100% 100%);
  }
  .speech-text {
    color:#e8dcc8; font-family:'Cormorant Garamond',serif;
    font-size:15px; line-height:1.6; font-style:italic;
  }
  .speech-typing::after { content:'|'; animation:blink 0.7s infinite; color:var(--gold); }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Particles */
  .particles { position:absolute; inset:0; z-index:5; pointer-events:none; overflow:hidden; border-radius:3px; }
  .particle { position:absolute; width:2px; height:2px; background:rgba(255,230,180,0.4); border-radius:50%; animation:float-up linear infinite; }
  @keyframes float-up{0%{transform:translateY(100%) translateX(0);opacity:0}10%{opacity:0.5}90%{opacity:0.2}100%{transform:translateY(-20px) translateX(var(--drift));opacity:0}}

  /* ===== CHAT ===== */
  .chat-side {
    display:flex; flex-direction:column; width:340px; height:480px;
    background:rgba(255,255,255,0.02); border:1px solid rgba(200,170,122,0.12);
    border-radius:16px; overflow:hidden; backdrop-filter:blur(10px);
  }
  .chat-header {
    padding:14px 18px; border-bottom:1px solid rgba(200,170,122,0.1);
    display:flex; align-items:center; gap:10px;
  }
  .chat-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;border:1px solid rgba(200,170,122,0.3)}
  .chat-avatar img{width:100%;height:100%;object-fit:cover}
  .chat-name{color:var(--gold);font-size:13px;letter-spacing:0.08em}
  .chat-status{color:rgba(200,170,122,0.4);font-size:11px}
  .gemini-badge{margin-left:auto;font-size:10px;padding:3px 8px;border:1px solid rgba(66,133,244,0.3);border-radius:8px;color:rgba(66,133,244,0.7)}

  .api-setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center}
  .api-setup p{color:rgba(200,170,122,0.6);font-size:12px;line-height:1.6}
  .api-setup a{color:var(--gold);text-decoration:none}
  .api-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(200,170,122,0.2);border-radius:8px;padding:10px 14px;color:#e8dcc8;font-size:13px;outline:none;font-family:monospace;transition:border-color 0.2s}
  .api-input:focus{border-color:rgba(200,170,122,0.5)}
  .api-btn{background:linear-gradient(135deg,rgba(200,170,122,0.2),rgba(200,170,122,0.1));border:1px solid rgba(200,170,122,0.35);border-radius:8px;color:var(--gold);font-size:13px;padding:10px 24px;cursor:pointer;transition:all 0.2s;letter-spacing:0.08em}
  .api-btn:hover{background:rgba(200,170,122,0.2)}

  .chat-main{display:none;flex-direction:column;flex:1;overflow:hidden}
  .chat-main.active{display:flex}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(200,170,122,0.2) transparent}
  .msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;animation:msg-in 0.3s ease}
  @keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-user{background:rgba(200,170,122,0.12);border:1px solid rgba(200,170,122,0.2);color:#e8dcc8;align-self:flex-end;border-radius:12px 12px 2px 12px}
  .msg-ai{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#d0c4b0;align-self:flex-start;border-radius:12px 12px 12px 2px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px}
  .msg-loading{display:flex;gap:5px;align-items:center;padding:12px 16px}
  .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:dot-pulse 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
  @keyframes dot-pulse{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

  .auto-bar{padding:8px 14px 0;display:flex;gap:6px;flex-wrap:wrap}
  .auto-chip{font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid rgba(200,170,122,0.2);color:rgba(200,170,122,0.6);cursor:pointer;background:transparent;transition:all 0.2s;letter-spacing:0.04em}
  .auto-chip:hover{border-color:rgba(200,170,122,0.5);color:var(--gold)}

  .chat-footer{padding:12px 14px;border-top:1px solid rgba(200,170,122,0.1);display:flex;gap:8px}
  .chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(200,170,122,0.15);border-radius:20px;padding:9px 16px;color:#e8dcc8;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border-color 0.2s}
  .chat-input:focus{border-color:rgba(200,170,122,0.4)}
  .send-btn{width:38px;height:38px;background:linear-gradient(135deg,rgba(200,170,122,0.25),rgba(200,170,122,0.1));border:1px solid rgba(200,170,122,0.3);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
  .send-btn:hover{background:rgba(200,170,122,0.3);transform:scale(1.05)}
  .send-btn svg{width:16px;height:16px;fill:var(--gold)}
</style>
</head>

let isTalking = false;
let mouthOpenness = 0;    // 0 = closed, 1 = max open
let mouthTarget = 0;
let talkPhase = 0;
let parallaxDX = 0, parallaxDY = 0;
let tParallaxDX = 0, tParallaxDY = 0;

// Parallax
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  tParallaxDX = (e.clientX - cx) / window.innerWidth * 18;
  tParallaxDY = (e.clientY - cy) / window.innerHeight * 14;
});

function drawFrame() {
  // Smooth parallax
  parallaxDX += (tParallaxDX - parallaxDX) * 0.06;
  parallaxDY += (tParallaxDY - parallaxDY) * 0.06;

  // Smooth mouth
  if (isTalking) {
    talkPhase += 0.18;
    // Organic multi-freq oscillation simulating speech rhythm
    mouthTarget = Math.max(0,
      0.45 * Math.sin(talkPhase * 2.3) +
      0.30 * Math.sin(talkPhase * 5.1 + 0.8) +
      0.25 * Math.sin(talkPhase * 1.1 + 1.2)
    );
  } else {
    mouthTarget *= 0.85; // smooth close
  }
  mouthOpenness += (mouthTarget - mouthOpenness) * 0.25;

  ctx.clearRect(0, 0, W, H);

  // Draw photo with slight parallax offset
  const ox = -6 + parallaxDX * -0.4;
  const oy = -6 + parallaxDY * -0.4;
  const sw = W + 12, sh = H + 12;
  ctx.drawImage(img, ox, oy, sw, sh);

  // Draw mouth overlay
  drawMouth(mouthOpenness);

  // Subtle face glow when talking
  if (mouthOpenness > 0.05) {
    const gx = W * MOUTH.cx;
    const gy = H * (MOUTH.cy - 0.30);
    const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, W * 0.45);
    gr.addColorStop(0, `rgba(255,210,170,${mouthOpenness * 0.06})`);
    gr.addColorStop(1, 'rgba(255,200,150,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(drawFrame);
}

function drawMouth(openness) {
  const cx = W * MOUTH.cx;
  const cy = H * MOUTH.cy;
  const rx = W * MOUTH.rx;
  const ryOpen = H * MOUTH.ryOpen;
  const ryBase = H * MOUTH.ryBase;
  const lipH = H * MOUTH.lipH;
  const ry = ryBase + (ryOpen - ryBase) * openness;

  // === Inner mouth (dark) ===
  if (openness > 0.04) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx * 0.82, ry * 0.75, 0, 0, Math.PI * 2);
    // Dark interior
    const innerGrad = ctx.createRadialGradient(cx, cy + ry*0.1, 0, cx, cy, rx);
    innerGrad.addColorStop(0, 'rgba(20,8,8,0.97)');
    innerGrad.addColorStop(0.7, 'rgba(35,12,12,0.95)');
    innerGrad.addColorStop(1, 'rgba(50,20,20,0.85)');
    ctx.fillStyle = innerGrad;
    ctx.fill();

    // Teeth hint (upper)
    if (openness > 0.15) {
      ctx.beginPath();
      const teethY = cy - ry * 0.15;
      const teethH = ry * 0.32 * Math.min(1, openness * 2);
      ctx.ellipse(cx, teethY, rx * 0.60, teethH, 0, Math.PI, 0);
      const teethGrad = ctx.createLinearGradient(cx, teethY - teethH, cx, teethY + teethH);
      teethGrad.addColorStop(0, 'rgba(245,238,230,0.95)');
      teethGrad.addColorStop(1, 'rgba(210,200,190,0.80)');
      ctx.fillStyle = teethGrad;
      ctx.fill();
    }
    ctx.restore();
  }

  // === Upper lip ===
  ctx.save();
  ctx.beginPath();
  // Upper lip: cupid's bow shape
  const lipRy = lipH + ry * 0.12;
  const lipTop = cy - ry - lipH * 0.3;

  ctx.moveTo(cx - rx, cy - ry * 0.1);
  // Left side
  ctx.quadraticCurveTo(cx - rx * 0.55, lipTop - lipRy * 0.5, cx - rx * 0.15, lipTop);
  // Cupid's bow dip
  ctx.quadraticCurveTo(cx, lipTop + lipRy * 0.8, cx + rx * 0.15, lipTop);
  // Right side
  ctx.quadraticCurveTo(cx + rx * 0.55, lipTop - lipRy * 0.5, cx + rx, cy - ry * 0.1);
  // Bottom of upper lip
  ctx.quadraticCurveTo(cx + rx * 0.4, cy - ry * 0.15 + lipH * 2, cx, cy - ry * 0.3 + lipH * 2.5);
  ctx.quadraticCurveTo(cx - rx * 0.4, cy - ry * 0.15 + lipH * 2, cx - rx, cy - ry * 0.1);
  ctx.closePath();

  const ulGrad = ctx.createLinearGradient(cx, lipTop - lipRy, cx, cy);
  ulGrad.addColorStop(0, 'rgba(200,130,130,0.92)');
  ulGrad.addColorStop(0.4, 'rgba(210,145,145,0.88)');
  ulGrad.addColorStop(1, 'rgba(175,100,105,0.95)');
  ctx.fillStyle = ulGrad;
  ctx.fill();

  // Highlight on upper lip
  ctx.beginPath();
  ctx.ellipse(cx - rx*0.1, lipTop + lipRy*0.3, rx*0.28, lipRy*0.3, -0.1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,220,215,0.25)';
  ctx.fill();
  ctx.restore();

  // === Lower lip ===
  ctx.save();
  ctx.beginPath();
  const lipBot = cy + ry + lipH * 0.3;
  const lowerRy = lipH * 1.6 + ry * 0.18;

  ctx.moveTo(cx - rx, cy + ry * 0.1);
  ctx.quadraticCurveTo(cx - rx * 0.5, lipBot + lowerRy * 0.9, cx, lipBot + lowerRy);
  ctx.quadraticCurveTo(cx + rx * 0.5, lipBot + lowerRy * 0.9, cx + rx, cy + ry * 0.1);
  ctx.quadraticCurveTo(cx + rx * 0.4, cy + ry * 0.15 - lipH, cx, cy + ry * 0.3 - lipH * 1.5);
  ctx.quadraticCurveTo(cx - rx * 0.4, cy + ry * 0.15 - lipH, cx - rx, cy + ry * 0.1);
  ctx.closePath();

  const llGrad = ctx.createLinearGradient(cx, cy, cx, lipBot + lowerRy);
  llGrad.addColorStop(0, 'rgba(190,115,118,0.90)');
  llGrad.addColorStop(0.5, 'rgba(210,140,142,0.88)');
  llGrad.addColorStop(1, 'rgba(175,100,105,0.85)');
  ctx.fillStyle = llGrad;
  ctx.fill();

  // Lower lip highlight
  ctx.beginPath();
  ctx.ellipse(cx + rx*0.05, lipBot + lowerRy*0.45, rx*0.35, lowerRy*0.35, 0.05, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,215,210,0.28)';
  ctx.fill();
  ctx.restore();

  // === Lip line crease ===
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - rx + 2, cy);
  ctx.quadraticCurveTo(cx, cy + ry * 0.15, cx + rx - 2, cy);
  ctx.strokeStyle = `rgba(130,65,70,${0.5 + openness * 0.2})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

// =====================================================
// SPEECH BUBBLE
// =====================================================
function showSpeech(text) {
  const bubble = document.getElementById('speechBubble');
  const textEl = document.getElementById('speechText');
  textEl.textContent = '';
  textEl.classList.add('speech-typing');
  bubble.classList.add('visible');
  let i = 0;
  const iv = setInterval(() => {
    textEl.textContent += text[i++];
    if (i >= text.length) {
      clearInterval(iv);
      textEl.classList.remove('speech-typing');
      setTimeout(() => bubble.classList.remove('visible'), 5000);
    }
  }, 38);
}

// =====================================================
// TTS
// =====================================================
let currentUtt = null;
function speak(text) {
  if (!window.speechSynthesis) return;
  if (currentUtt) speechSynthesis.cancel();
  isTalking = true;

  const utt = new SpeechSynthesisUtterance(text);
  currentUtt = utt;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('female'))
    || voices.find(v => v.lang.startsWith('ru'))
    || voices.find(v => v.name.toLowerCase().includes('female'))
    || voices[0];
  if (v) utt.voice = v;
  utt.rate = 0.92; utt.pitch = 1.1; utt.volume = 1;
  utt.onend = () => { isTalking = false; currentUtt = null; };
  utt.onerror = () => { isTalking = false; };
  speechSynthesis.speak(utt);
}

// =====================================================
// GEMINI API
// =====================================================
let API_KEY = '';
let conversationHistory = [];

const SYSTEM_PROMPT = `Ты — Sophia, красивая молодая женщина на фотографии. Ты находишься в зимних Альпах и общаешься с пользователем. Говори тепло, элегантно, немного загадочно. Отвечай коротко — 1-3 предложения максимум. Говори на том языке, на котором пишет пользователь. Будь живой, чувственной, интересной собеседницей.`;

const AUTO_PROMPTS = {
  greeting:   'Поздоровайся тепло и скажи что-то приятное собеседнику.',
  mood:       'Расскажи о своём настроении прямо сейчас — поэтично и искренне.',
  compliment: 'Сделай искренний и красивый комплимент собеседнику.',
  story:      'Расскажи короткую красивую историю или наблюдение о жизни.'
};

function initChat() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('AIza')) { alert('Введите корректный Gemini API ключ (AIza...)'); return; }
  API_KEY = key;
  document.getElementById('apiSetup').style.display = 'none';
  document.getElementById('chatMain').classList.add('active');
  setTimeout(() => triggerAuto('greeting'), 600);
}

async function callGemini(userText, isAuto) {
  const contents = [];
  if (!isAuto) conversationHistory.push({ role: 'user', content: userText });

  for (const msg of conversationHistory) {
    contents.push({ role: msg.role === 'user' ? 'user' : 'model', parts: [{ text: msg.content }] });
  }
  if (isAuto) contents.push({ role: 'user', parts: [{ text: userText }] });

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents,
        generationConfig: { maxOutputTokens: 150, temperature: 0.9 }
      })
    }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

function addMessage(text, role) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-ai');
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function addLoading() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-ai msg-loading'; div.id = 'loadingMsg';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeLoading() { const el = document.getElementById('loadingMsg'); if (el) el.remove(); }

async function askAI(userText) {
  document.getElementById('statusText').textContent = '● печатает...';
  addLoading();
  try {
    const reply = await callGemini(userText, false);
    removeLoading();
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage(reply, 'ai');
    showSpeech(reply);
    speak(reply);
  } catch(e) {
    removeLoading();
    addMessage('Ошибка: ' + e.message, 'ai');
  }
  document.getElementById('statusText').textContent = '● онлайн';
}

async function triggerAuto(type) {
  document.getElementById('statusText').textContent = '● печатает...';
  addLoading();
  try {
    const reply = await callGemini(AUTO_PROMPTS[type], true);
    removeLoading();
    conversationHistory.push({ role: 'user', content: AUTO_PROMPTS[type] });
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage(reply, 'ai');
    showSpeech(reply);
    speak(reply);
  } catch(e) {
    removeLoading();
    addMessage('Ошибка: ' + e.message, 'ai');
  }
  document.getElementById('statusText').textContent = '● онлайн';
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  askAI(text);
}
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
